[env:unor4wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino

; ✅ 栈配置: 6KB (云方案无WebSocket/BLE, RAM更充裕)
build_flags =
    -I ${platformio.packages_dir}/framework-arduinorenesas-uno/libraries/BlockDevices
    -Wl,--defsym=__stack_size__=0x1000  ; [CLOUD] 4KB栈足够（无WS库/BLE/看门狗）

lib_deps = 
    EEPROM
    bblanchon/ArduinoJson@^7.0.0
    ArduinoBLE

lib_extra_dirs = 
    ${platformio.packages_dir}/framework-arduinorenesas-uno/libraries/BlockDevices

monitor_speed = 115200
monitor_filters = default